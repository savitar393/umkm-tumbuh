services:
  postgres:
    image: postgres:16-alpine
    container_name: umkm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - umkm_network

volumes:
  postgres_data:

networks:
  umkm_network:
    driver: bridge