services:
  postgres:
    image: postgres:16-alpine
    container_name: umkm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-umkm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-umkm_password}
      POSTGRES_DB: ${POSTGRES_DB:-umkm_tumbuh}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - umkm_network

  db-migrate:
    build:
      context: ./db
      dockerfile: migrator/Dockerfile
    container_name: umkm_db_migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - umkm_network
    restart: "no"

  auth-seed-admin:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: umkm_auth_seed_admin
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      ADMIN_ID: ${ADMIN_ID:-AKUNADMIN001}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Admin Pemerintah}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    command: ["/app/auth-seed-admin"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - umkm_network
    restart: "no"

  db-seed:
    image: postgres:16-alpine
    container_name: umkm_db_seed
    profiles:
      - seed
    working_dir: /app/data
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
    volumes:
      - ./db/loaders:/app/loaders:ro
      - ./db/dummy/seed-csv:/app/data:ro
    command:
      - sh
      - -c
      - |
        set -e
        echo "Loading committed dummy CSV dataset..."
        psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f /app/loaders/load_generated_csv.sql
        echo "Dummy CSV dataset loaded successfully."
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - umkm_network
    restart: "no"

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: umkm_auth_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
    ports:
      - "8080:8080"
    depends_on:
      auth-seed-admin:
        condition: service_completed_successfully
    networks:
      - umkm_network

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    container_name: umkm_user_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      USER_SERVICE_HOST: 0.0.0.0
      USER_SERVICE_PORT: 8081
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - umkm_network

  # ============================================================
  # Training Service (merged with Certificate Service)
  # ============================================================
  training-service:
    build:
      context: ../services/training-service
      dockerfile: Dockerfile
    container_name: umkm_training_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_HOST: 0.0.0.0
      TRAINING_SERVICE_PORT: ${TRAINING_SERVICE_PORT:-8084}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      garage:
        condition: service_started
    networks:
      - umkm_network

  garage:
    image: dxflrs/garage:v2.0.0
    container_name: umkm_garage
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # S3 web
      - "3903:3903" # admin API
    networks:
      - umkm_network

  partnerships-service:
    build:
      context: ../services/partnerships-service
      dockerfile: Dockerfile
    container_name: umkm_partnerships_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8082
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks:
      - umkm_network

  document-service:
    build:
      context: ../services/document-service
      dockerfile: Dockerfile
    container_name: umkm_document_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DOCUMENT_SERVICE_HOST: 0.0.0.0
      DOCUMENT_SERVICE_PORT: 8083
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: postgres://${POSTGRES_USER:-umkm_user}:${POSTGRES_PASSWORD:-umkm_password}@postgres:5432/${POSTGRES_DB:-umkm_tumbuh}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://garage:3900}
      OBJECT_STORAGE_PUBLIC_ENDPOINT: ${OBJECT_STORAGE_PUBLIC_ENDPOINT:-http://localhost:3900}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-garage}
      OBJECT_STORAGE_USE_SSL: ${OBJECT_STORAGE_USE_SSL:-false}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-umkm_garage_access_key}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-umkm_garage_secret_key}
      OBJECT_STORAGE_BUCKET_DOCUMENTS: ${OBJECT_STORAGE_BUCKET_DOCUMENTS:-documents}
      OBJECT_STORAGE_BUCKET_CERTIFICATES: ${OBJECT_STORAGE_BUCKET_CERTIFICATES:-certificates}
      OBJECT_STORAGE_BUCKET_PRODUCT_IMAGES: ${OBJECT_STORAGE_BUCKET_PRODUCT_IMAGES:-product-images}
      OBJECT_STORAGE_BUCKET_PARTNERSHIP_FILES: ${OBJECT_STORAGE_BUCKET_PARTNERSHIP_FILES:-partnership-files}
    ports:
      - "8083:8083"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      garage:
        condition: service_started
    networks:
      - umkm_network

volumes:
  postgres_data:

networks:
  umkm_network:
    driver: bridge
