metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_mode = "none"

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"
rpc_secret = "CHANGE_ME_LOCAL_GARAGE_RPC_SECRET_32_CHARS_MINIMUM"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "CHANGE_ME_LOCAL_GARAGE_ADMIN_TOKEN"
metrics_token = "CHANGE_ME_LOCAL_GARAGE_METRICS_TOKEN"
