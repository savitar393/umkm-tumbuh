name: Backend Newman Tests

on:
  push:
    branches: [ main, develop, "feat/**", "test/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  newman-backend:
    name: Postman/Newman backend API tests
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: umkm_user
      POSTGRES_PASSWORD: umkm_password
      POSTGRES_DB: umkm_tumbuh
      JWT_SECRET: dev_secret_change_me_minimum_32_chars
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js for Newman
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Newman and HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create CI env file
        run: |
          cat > .env <<EOF_ENV
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          JWT_SECRET=${JWT_SECRET}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          FRONTEND_URL=${FRONTEND_URL}
          EOF_ENV

      - name: Start backend stack
        run: |
          docker compose --env-file .env -f infra/docker-compose.yml up -d --build
          docker compose --env-file .env -f infra/docker-compose.yml ps

      - name: Wait for backend services
        run: |
          echo "Waiting for backend services to be ready..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/v1/health >/dev/null 2>&1 && \
               curl -fsS http://localhost:8081/api/v1/health >/dev/null 2>&1; then
              echo "Backend services are ready!"
              exit 0
            fi
            echo "Waiting for services... (attempt $i/60)"
            sleep 3
          done
          echo "Services failed to start. Showing logs:"
          docker compose --env-file .env -f infra/docker-compose.yml logs
          exit 1

      - name: Run Newman backend tests
        run: |
          mkdir -p tests/postman/reports
          newman run tests/postman/umkm-tumbuh-backend.postman_collection.json \
            -e tests/postman/local.postman_environment.json \
            --env-var "admin_email=${ADMIN_EMAIL}" \
            --env-var "admin_password=${ADMIN_PASSWORD}" \
            --env-var "auth_base_url=http://localhost:8080" \
            --env-var "user_base_url=http://localhost:8081" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export tests/postman/reports/backend-report.html

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-newman-report
          path: tests/postman/reports/backend-report.html

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose --env-file .env -f infra/docker-compose.yml logs

      - name: Stop backend stack
        if: always()
        run: docker compose --env-file .env -f infra/docker-compose.yml down -v