name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auth-service:
    name: Auth Service / Go
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/auth-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/auth-service/go.mod
          cache-dependency-path: services/auth-service/go.sum

      - name: Download Go dependencies
        run: go mod download

      - name: Check Go formatting
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./...

      - name: Build auth-service
        run: go build ./...

  frontend:
    name: Frontend / React Vite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  infra:
    name: Infrastructure / Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate docker-compose config
        run: docker compose --env-file .env.example -f infra/docker-compose.yml config
