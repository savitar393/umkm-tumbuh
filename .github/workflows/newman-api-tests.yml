name: Backend API Newman Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/frontend-sales-reporting
  pull_request:

jobs:
  newman:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create CI env file
        run: |
          cat > .env.ci <<'EOF'
          APP_ENV=development
          FRONTEND_URL=http://localhost:5173
          POSTGRES_USER=umkm_user
          POSTGRES_PASSWORD=umkm_password
          POSTGRES_DB=umkm_tumbuh
          JWT_SECRET=ci_super_secret_for_newman_tests_change_me
          JWT_EXPIRE_MINUTES=1440
          ADMIN_ID=AKUNADMIN001
          ADMIN_FULL_NAME=Admin Pemerintah
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin12345
          OBJECT_STORAGE_ENDPOINT=http://garage:3900
          OBJECT_STORAGE_PUBLIC_ENDPOINT=http://localhost:3900
          OBJECT_STORAGE_REGION=garage
          OBJECT_STORAGE_USE_SSL=false
          OBJECT_STORAGE_ACCESS_KEY=umkm_garage_access_key
          OBJECT_STORAGE_SECRET_KEY=umkm_garage_secret_key
          OBJECT_STORAGE_BUCKET_PRODUCT_IMAGES=product-images
          EOF

      - name: Start stateful services
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml up -d --build postgres garage

      - name: Run database migrations
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml up --build --exit-code-from db-migrate db-migrate

      - name: Seed admin account
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml up --build --exit-code-from auth-seed-admin auth-seed-admin

      - name: Start backend services
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml up -d --build auth-service user-service

      - name: Wait for API health checks
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/api/v1/health >/dev/null               && curl -fsS http://localhost:8081/api/v1/health >/dev/null; then
              echo "APIs are ready."
              exit 0
            fi
            echo "Waiting for APIs... ($i/60)"
            sleep 2
          done
          docker compose --env-file .env.ci -f infra/docker-compose.yml ps
          docker compose --env-file .env.ci -f infra/docker-compose.yml logs auth-service user-service
          exit 1

      - name: Run Newman collection
        run: |
          mkdir -p tests/postman/reports
          newman run tests/postman/umkm-tumbuh-current-progress.postman_collection.json             -e tests/postman/local.postman_environment.json             -r cli,htmlextra             --reporter-htmlextra-export tests/postman/reports/backend-current-progress-report.html             --timeout-request 15000             --delay-request 100

      - name: Upload Newman HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-backend-current-progress-report
          path: tests/postman/reports/backend-current-progress-report.html
          if-no-files-found: ignore

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml logs --no-color

      - name: Stop Docker Compose
        if: always()
        run: docker compose --env-file .env.ci -f infra/docker-compose.yml down -v
